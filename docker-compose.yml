services:
  auth-service:
    build:
      context: .
      args:
        SERVICE: auth-service
    ports:
      - "8081:8081"
    environment:
      - AUTH_SERVER_PORT=:8081
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - POSTGRES_DSN=postgres://${AUTH_POSTGRES_USER}:${AUTH_POSTGRES_PASSWORD}@postgres-auth:5432/${AUTH_POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres-auth:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully

  tasks-service:
    build:
      context: .
      args:
        SERVICE: tasks-service
    ports:
      - "8082:8082"
    environment:
      - TASKS_SERVER_PORT=:8082
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - POSTGRES_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - MONGO_DSN=${MONGO_DSN}
      - REDIS_DSN=${REDIS_DSN}
      - RABBITMQ_DSN=${RABBITMQ_DSN}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mongo:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notifier-service:
    build:
      context: .
      args:
        SERVICE: notifier-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - TASKS_SERVICE_URL=http://tasks-service:8082
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
      tasks-service:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: tasks_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=tododb

  postgres-auth:
    image: postgres:15-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    ports:
      - "${AUTH_POSTGRES_PORT}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    volumes:
      - ./migrations/tasks:/migrations
    depends_on:
      postgres:
        condition: service_healthy

  migrate-auth:
    image: ghcr.io/kukymbr/goose-docker:latest
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${AUTH_POSTGRES_USER}:${AUTH_POSTGRES_PASSWORD}@postgres-auth:5432/${AUTH_POSTGRES_DB}?sslmode=disable
    volumes:
      - ./migrations/auth:/migrations
    depends_on:
      postgres-auth:
        condition: service_healthy
volumes:
  postgres_data:
  postgres_auth_data:
  mongo_data:
  rabbitmq_data: